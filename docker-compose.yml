# Next AI Draw.io - 主应用服务
# 使用方法：
#   1. 启动：docker-compose up -d
#   2. 停止：docker-compose down
#   3. 查看日志：docker-compose logs -f
#   4. 访问：http://localhost:3001
#
# 注意：请先启动 draw.io 服务 (docker-compose.drawio.yml)

services:
  next-ai-draw-io:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_DRAWIO_BASE_URL=${NEXT_PUBLIC_DRAWIO_BASE_URL:-http://localhost:8080}
    container_name: next-ai-draw-io
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      # 使用 Docker 网络连接到 draw.io（如果 draw.io 也在 Docker 中）
      # 或者使用 host.docker.internal 连接到宿主机的 draw.io
      NEXT_PUBLIC_DRAWIO_BASE_URL: http://host.docker.internal:8080
      # 数据库连接（使用 Docker 网络）
      DATABASE_URL: postgresql://nextai:nextai_password@postgres:5432/nextai_drawio
      # 设置应用端口
      PORT: 3001
    restart: unless-stopped
    extra_hosts:
      # 允许容器访问宿主机的 draw.io 服务
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - nextai-network
    # 本地构建配置（包含认证功能）

  postgres:
    image: postgres:15-alpine
    container_name: nextai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nextai
      POSTGRES_PASSWORD: nextai_password
      POSTGRES_DB: nextai_drawio
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextai -d nextai_drawio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nextai-network

volumes:
  postgres_data:
    driver: local

networks:
  nextai-network:
    driver: bridge
